<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="產生日期排程並自動寫入 Google Sheets">
  <title>排程寫入 Google Sheet</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══ CSS 變數（深色預設） ══ */
    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --bdr: #475569;
      --acc: #3b82f6;
      --acc2: #60a5fa;
      --aglo: rgba(59, 130, 246, 0.25);
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --tx: #f1f5f9;
      --tx2: #94a3b8;
      --tx3: #cbd5e1;
      --shd: 0 4px 24px rgba(0, 0, 0, 0.45);
      --r: 14px;
      --rs: 8px;
    }

    body.light {
      --bg: #f0f4f8;
      --bg2: #ffffff;
      --bg3: #e2e8f0;
      --bdr: #94a3b8;
      --acc: #1d4ed8;
      --acc2: #2563eb;
      --aglo: rgba(29, 78, 216, 0.15);
      --ok: #15803d;
      --warn: #b45309;
      --err: #b91c1c;
      --tx: #0f172a;
      --tx2: #475569;
      --tx3: #334155;
      --shd: 0 4px 24px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 17px;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      padding-bottom: 60px;
      transition: background .25s, color .25s;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 60%);
      border-bottom: 1px solid var(--bdr);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    body.light .header {
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
    }

    .hleft {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hico {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--acc), #818cf8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .header sub {
      font-size: 0.75rem;
      color: #93c5fd;
      display: block;
      margin-top: 2px;
    }

    .tbtn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 6px 14px;
      color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }

    .tbtn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* Container & Card */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 22px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shd);
      transition: background .25s, border-color .25s;
    }

    .ctit {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--acc2);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctit::before {
      content: '';
      width: 3px;
      height: 15px;
      background: var(--acc);
      border-radius: 2px;
    }

    /* API bar */
    .abar {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      border-radius: var(--rs);
      padding: 11px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .abar label {
      font-size: 0.75rem;
      color: var(--tx2);
      font-weight: 600;
    }

    .abar input {
      background: transparent;
      border: none;
      color: var(--tx);
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      outline: none;
      width: 100%;
    }

    .abar input::placeholder {
      color: var(--tx2);
    }

    /* Field rows */
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .fld {
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
      min-width: 140px;
    }

    .fld label {
      font-size: 0.78rem;
      color: var(--tx2);
      font-weight: 600;
    }

    /* Inputs */
    input[type="date"],
    input[type="time"],
    input[type="number"],
    input[type="text"],
    textarea {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      border-radius: var(--rs);
      color: var(--tx);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      padding: 11px 13px;
      outline: none;
      width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }

    /* placeholder 灰字 */
    input::placeholder,
    textarea::placeholder {
      color: var(--tx2);
      opacity: 1;
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.6);
      cursor: pointer;
    }

    body.light input[type="date"]::-webkit-calendar-picker-indicator,
    body.light input[type="time"]::-webkit-calendar-picker-indicator {
      filter: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--acc);
      box-shadow: 0 0 0 3px var(--aglo);
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* AM/PM badge */
    .tw {
      position: relative;
    }

    .ampm {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--acc);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      pointer-events: none;
    }

    .ampm.pm {
      background: #7c3aed;
    }

    /* Interval */
    .ivg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .ivi {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      border-radius: var(--rs);
      padding: 12px 8px 8px;
      text-align: center;
    }

    .ivi label {
      font-size: 0.75rem;
      color: var(--tx2);
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }

    .ivi input {
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--acc2);
      background: transparent;
      border: none;
      padding: 0;
      width: 100%;
    }

    .ivi input:focus {
      box-shadow: none;
    }

    .ivh {
      font-size: 0.78rem;
      color: var(--tx2);
      margin-top: 12px;
      text-align: center;
    }

    .ivh span {
      color: var(--warn);
      font-weight: 600;
    }

    /* Textarea */
    textarea {
      resize: vertical;
      min-height: 70px;
    }

    /* Buttons */
    .brow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      min-width: 130px;
      padding: 13px 16px;
      border: none;
      border-radius: var(--rs);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-s {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
    }

    .btn-d {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: #fff;
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    /* Preview */
    .prev-wrap {
      overflow-x: auto;
      border-radius: var(--rs);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead th {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      padding: 9px 10px;
      text-align: center;
      color: var(--acc2);
      font-weight: 700;
      white-space: nowrap;
    }

    tbody td {
      border: 1px solid var(--bdr);
      padding: 8px 11px;
      color: var(--tx3);
      white-space: nowrap;
    }

    tbody tr:nth-child(even) td {
      background: rgba(128, 128, 128, 0.05);
    }

    .ca {
      color: var(--tx);
      font-weight: 500;
    }

    .cb {
      text-align: center;
      color: var(--ok);
      font-weight: 700;
    }

    .cc {
      color: var(--tx2);
    }

    .rn {
      color: var(--tx2);
      text-align: center;
      font-size: 0.8rem;
    }

    /* Hint text inside preview */
    .phint {
      text-align: center;
      color: var(--tx2);
      padding: 24px 0;
      font-size: 0.95rem;
    }

    /* Pills */
    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .pill {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      border-radius: 20px;
      padding: 4px 13px;
      font-size: 0.8rem;
      color: var(--tx2);
    }

    .pill b {
      color: var(--tx);
    }

    .wpill {
      border-color: var(--warn);
      background: rgba(245, 158, 11, .08);
      color: var(--warn);
    }

    .wpill b {
      color: var(--warn);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3);
      border: 1px solid var(--bdr);
      border-radius: 40px;
      padding: 11px 24px;
      font-size: 0.95rem;
      color: var(--tx);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: transform .35s cubic-bezier(.16, 1, .3, 1);
      z-index: 200;
      max-width: 92vw;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.ok {
      border-color: var(--ok);
    }

    #toast.err {
      border-color: var(--err);
    }

    #toast.warn {
      border-color: var(--warn);
    }

    @media (max-width:480px) {
      .ivg {
        grid-template-columns: repeat(2, 1fr);
      }

      .header h1 {
        font-size: .95rem;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="hleft">
      <div class="hico">📅</div>
      <div>
        <h1>排程寫入 Google Sheet</h1>
        <sub>自動產生日期排程並寫入試算表</sub>
      </div>
    </div>
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">☀️ 白色模式</button>
  </header>

  <div class="container">

    <!-- Apps Script URL -->
    <div class="card">
      <div class="ctit">⚙ Apps Script 設定</div>
      <div class="abar">
        <label>網頁應用程式 URL</label>
        <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
      </div>
    </div>

    <!-- 日期 & 時間 -->
    <div class="card">
      <div class="ctit">📆 開始 / 結束 日期時間</div>
      <div class="row">
        <div class="fld">
          <label>開始日期</label>
          <input type="date" id="startDate">
        </div>
        <div class="fld">
          <label>開始時間</label>
          <div class="tw">
            <input type="time" id="startTime" oninput="refreshAmpm()">
            <span class="ampm" id="startAmpm" style="display:none"></span>
          </div>
        </div>
      </div>
      <div class="row" style="margin-bottom:0">
        <div class="fld">
          <label>結束日期</label>
          <input type="date" id="endDate">
        </div>
        <div class="fld">
          <label>結束時間</label>
          <div class="tw">
            <input type="time" id="endTime" oninput="refreshAmpm()">
            <span class="ampm" id="endAmpm" style="display:none"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 間隔 -->
    <div class="card">
      <div class="ctit">🔁 間隔設定（預設 0月 1日 0小時 0分鐘）</div>
      <div class="ivg">
        <div class="ivi"><label>月</label><input type="number" id="iM" min="0" value="0" oninput="ivHint()"></div>
        <div class="ivi"><label>日</label><input type="number" id="iD" min="0" value="1" oninput="ivHint()"></div>
        <div class="ivi"><label>小時</label><input type="number" id="iH" min="0" value="0" oninput="ivHint()"></div>
        <div class="ivi"><label>分鐘</label><input type="number" id="iN" min="0" value="0" oninput="ivHint()"></div>
      </div>
      <p class="ivh">目前間隔：<span id="ivSpan">0月 1日 0小時 0分鐘</span></p>
    </div>

    <!-- C 欄 -->
    <div class="card">
      <div class="ctit">📝 C 欄內容（每筆相同）</div>
      <textarea id="colC" placeholder="輸入要填入 C 欄的文字"></textarea>
    </div>

    <!-- 按鈕 -->
    <div class="brow">
      <button class="btn btn-s" id="sendBtn" onclick="doSend()" disabled>🚀 寫入 Google Sheet</button>
      <button class="btn btn-d" onclick="doClear()">🗑 清除</button>
    </div>

    <!-- 預覽（常駐顯示） -->
    <div class="card">
      <div class="ctit">📊 即時預覽</div>
      <div class="pills" id="pillRow"></div>
      <div class="prev-wrap">
        <p class="phint" id="prevHint">請填寫上方日期、時間與間隔，結果將即時顯示於此。</p>
        <table id="prevTable" style="display:none">
          <thead>
            <tr>
              <th style="width:38px">列</th>
              <th>A 欄　日期時間</th>
              <th>B 欄</th>
              <th>C 欄</th>
            </tr>
          </thead>
          <tbody id="prevBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    /* ── 主題切換 ─────────────────────────────────────────── */
    function toggleTheme() {
      document.body.classList.toggle('light');
      const isL = document.body.classList.contains('light');
      document.getElementById('themeBtn').textContent = isL ? '🌙 深色模式' : '☀️ 白色模式';
      localStorage.setItem('theme', isL ? 'light' : 'dark');
    }

    /* ── 初始化 ───────────────────────────────────────────── */
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('theme') === 'light') toggleTheme();

      const u = localStorage.getItem('gs_url');
      if (u) document.getElementById('apiUrl').value = u;
      document.getElementById('apiUrl').addEventListener('input', e =>
        localStorage.setItem('gs_url', e.target.value.trim()));

      if ('serviceWorker' in navigator)
        navigator.serviceWorker.register('./sw.js').catch(() => { });

      // 即時更新：監聽所有輸入欄位
      ['startDate', 'startTime', 'endDate', 'endTime', 'iM', 'iD', 'iH', 'iN', 'colC'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', autoPreview);
        el.addEventListener('change', autoPreview);
      });
    });

    function pad(n) { return String(n).padStart(2, '0'); }
    function fmtD(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }

    /* ── AM/PM 標籤 ──────────────────────────────────────── */
    function refreshAmpm() {
      setAmpm('startTime', 'startAmpm');
      setAmpm('endTime', 'endAmpm');
    }
    function setAmpm(tId, bId) {
      const v = document.getElementById(tId).value;
      const el = document.getElementById(bId);
      if (!v) { el.style.display = 'none'; return; }
      const h = parseInt(v.split(':')[0], 10);
      el.style.display = '';
      el.textContent = h < 12 ? '上午' : '下午';
      el.className = 'ampm' + (h < 12 ? '' : ' pm');
    }

    /* ── 間隔提示 ─────────────────────────────────────────── */
    function ivHint() {
      const [M, D, H, N] = getIv();
      document.getElementById('ivSpan').textContent = `${M}月 ${D}日 ${H}小時 ${N}分鐘`;
    }
    function getIv() {
      return [+document.getElementById('iM').value || 0,
      +document.getElementById('iD').value || 0,
      +document.getElementById('iH').value || 0,
      +document.getElementById('iN').value || 0];
    }

    /* ── 格式化 A 欄 ─────────────────────────────────────── */
    function fmtA(dt) {
      const y = dt.getFullYear(), mo = dt.getMonth() + 1, d = dt.getDate();
      const h24 = dt.getHours(), m = dt.getMinutes();
      const isAm = h24 < 12, h12 = h24 % 12 === 0 ? 12 : h24 % 12;
      return `${y}/${mo}/${d} ${isAm ? '上午' : '下午'} ${h12}:${pad(m)}`;
    }

    /* ── 產生排程 ─────────────────────────────────────────── */
    /*
      情境 A：只有日/月間隔（時間步進=0）
        → 每個步進日期 × startTime，直到 endDate+endTime
    
      情境 B：只有小時/分鐘步進（日/月=0）
        → 從 startDt 每步進，直到 endDt
    
      情境 C：日/月間隔 + 小時/分鐘步進
        → 對每個步進「日期」，從 startTime 到 endTime 每步進一次時間
        例：開始 03/02 10:00，結束 03/04 12:00，間隔 1日 1小時
        → 03/02: 10,11,12  03/03: 10,11,12  03/04: 10,11,12
    */
    function buildRows() {
      const sd = document.getElementById('startDate').value;
      const ed = document.getElementById('endDate').value;
      const st = document.getElementById('startTime').value || '00:00';
      const et = document.getElementById('endTime').value || '00:00';
      if (!sd || !ed) return null;  // 靜默返回，等用戶補完

      const startDt = new Date(`${sd}T${st}:00`);
      const endDt = new Date(`${ed}T${et}:00`);
      if (isNaN(startDt) || isNaN(endDt)) return null;
      if (startDt > endDt) return null; // 靜默

      const [M, D, H, N] = getIv();
      if (M === 0 && D === 0 && H === 0 && N === 0) return null;

      const colC = document.getElementById('colC').value;
      const rows = [];
      const hasDateStep = M > 0 || D > 0;
      const hasTimeStep = H > 0 || N > 0;

      if (hasDateStep && hasTimeStep) {
        // 情境 C
        const [sh, sm] = st.split(':').map(Number);
        const [eh, em] = et.split(':').map(Number);
        const sMin = sh * 60 + sm, eMin = eh * 60 + em, step = H * 60 + N;
        if (step <= 0) return rows;

        let curDay = new Date(`${sd}T00:00:00`);
        const endDay = new Date(`${ed}T00:00:00`);
        while (curDay <= endDay) {
          for (let m = sMin; m <= eMin; m += step) {
            const e = new Date(curDay);
            e.setHours(Math.floor(m / 60), m % 60, 0, 0);
            rows.push({ a: fmtA(e), b: 'O', c: colC });
          }
          const nx = new Date(curDay);
          if (M > 0) nx.setMonth(nx.getMonth() + M);
          if (D > 0) nx.setDate(nx.getDate() + D);
          if (nx <= curDay) break;
          curDay = nx;
        }

      } else if (hasDateStep) {
        // 情境 A
        let cur = new Date(startDt);
        while (cur <= endDt) {
          rows.push({ a: fmtA(cur), b: 'O', c: colC });
          const nx = new Date(cur);
          if (M > 0) nx.setMonth(nx.getMonth() + M);
          if (D > 0) nx.setDate(nx.getDate() + D);
          if (nx <= cur) break;
          cur = nx;
        }

      } else {
        // 情境 B
        let cur = new Date(startDt);
        while (cur <= endDt) {
          rows.push({ a: fmtA(cur), b: 'O', c: colC });
          const nx = new Date(cur);
          nx.setHours(nx.getHours() + H);
          nx.setMinutes(nx.getMinutes() + N);
          if (nx <= cur) break;
          cur = nx;
        }
      }
      return rows;
    }

    /* ── 即時預覽（防抖 120ms）─────────────────────────────── */
    let cached = [], _dt;
    function autoPreview() {
      refreshAmpm(); ivHint();
      clearTimeout(_dt);
      _dt = setTimeout(renderPreview, 120);
    }

    function renderPreview() {
      const hint = document.getElementById('prevHint');
      const tbl = document.getElementById('prevTable');
      const rows = buildRows();

      if (!rows) {
        // 資料不足，顯示提示
        hint.textContent = '請填寫上方日期、時間與間隔，結果將即時顯示於此。';
        hint.style.display = ''; tbl.style.display = 'none';
        document.getElementById('pillRow').innerHTML = '';
        document.getElementById('sendBtn').disabled = true;
        cached = []; return;
      }

      if (rows.length === 0) {
        hint.textContent = '此範圍與間隔無法產生任何資料，請重新確認。';
        hint.style.display = ''; tbl.style.display = 'none';
        document.getElementById('pillRow').innerHTML = '';
        document.getElementById('sendBtn').disabled = true;
        cached = []; return;
      }

      cached = rows;
      const body = document.getElementById('prevBody');
      body.innerHTML = '';
      rows.forEach((r, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="rn">${2 + i}</td><td class="ca">${r.a}</td><td class="cb">${r.b}</td><td class="cc">${esc(r.c)}</td>`;
        body.appendChild(tr);
      });

      const LIMIT = 1000, over = rows.length > LIMIT;
      document.getElementById('pillRow').innerHTML = `
    <div class="pill">總筆數 <b>${rows.length}</b></div>
    <div class="pill">第一筆 <b>${rows[0].a}</b></div>
    <div class="pill">最後一筆 <b>${rows[rows.length - 1].a}</b></div>
    ${over ? `<div class="pill wpill">⚠ 超過 <b>${LIMIT}</b> 列</div>` : ''}`;

      if (over) notify('列數超出提醒', `共 ${rows.length} 筆，超過 ${LIMIT} 列，請確認 Sheet 空間`);

      hint.style.display = 'none'; tbl.style.display = '';
      document.getElementById('sendBtn').disabled = false;
    }

    /* ── 清除 ─────────────────────────────────────────────── */
    function doClear() {
      ['startDate', 'startTime', 'endDate', 'endTime', 'colC'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('iM').value = 0;
      document.getElementById('iD').value = 1;
      document.getElementById('iH').value = 0;
      document.getElementById('iN').value = 0;
      refreshAmpm(); ivHint();
      document.getElementById('prevBody').innerHTML = '';
      document.getElementById('pillRow').innerHTML = '';
      document.getElementById('prevHint').textContent = '請填寫上方日期、時間與間隔，結果將即時顯示於此。';
      document.getElementById('prevHint').style.display = '';
      document.getElementById('prevTable').style.display = 'none';
      document.getElementById('sendBtn').disabled = true;
      cached = [];
    }

    /* ── 寫入 Google Sheet ────────────────────────────────── */
    async function doSend() {
      const url = document.getElementById('apiUrl').value.trim();
      if (!url) { toast('請填寫 Apps Script URL', 'err'); return; }
      if (!cached.length) { toast('請先確認預覽有資料', 'warn'); return; }
      const btn = document.getElementById('sendBtn');
      btn.disabled = true; btn.textContent = '⏳ 寫入中...';
      toast('正在寫入…', 'warn');
      try {
        await fetch(url, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rows: cached })
        });
        toast(`✅ 已送出 ${cached.length} 筆`, 'ok');
      } catch (e) {
        toast('❌ 寫入失敗：' + e.message, 'err');
      } finally {
        btn.disabled = false; btn.innerHTML = '🚀 寫入 Google Sheet';
      }
    }

    /* ── Toast ───────────────────────────────────────────── */
    let _tt;
    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'show ' + type;
      clearTimeout(_tt); _tt = setTimeout(() => { el.className = ''; }, 4200);
    }

    /* ── 系統通知 ─────────────────────────────────────────── */
    async function notify(title, body) {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') await Notification.requestPermission();
      if (Notification.permission === 'granted') {
        if ('serviceWorker' in navigator) {
          const reg = await navigator.serviceWorker.getRegistration();
          if (reg) { reg.showNotification(title, { body, icon: './icons/icon-192.png' }); return; }
        }
        new Notification(title, { body, icon: './icons/icon-192.png' });
      }
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
  </script>
</body>

</html>
